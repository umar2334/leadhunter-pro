<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadHunter Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f8;
      color: #1a202c;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: #fff;
      border-bottom: 1px solid #e8eaf0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo-text {
      font-size: 14px; font-weight: 800; color: #1a202c; letter-spacing: -0.3px;
    }
    .logo-text span { color: #6366f1; }
    .saved-pill {
      font-size: 11px; font-weight: 700;
      background: #eff6ff; color: #3b82f6;
      border: 1px solid #bfdbfe;
      padding: 3px 10px; border-radius: 999px;
    }

    /* Body */
    .body { padding: 12px; }

    .status-msg {
      font-size: 12px; color: #718096;
      text-align: center; margin-bottom: 12px;
      background: #fff; border: 1px solid #e8eaf0;
      border-radius: 8px; padding: 10px;
    }

    /* Buttons */
    .btn {
      width: 100%; padding: 10px 14px;
      border-radius: 9px; border: none;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #6366f1; color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }

    .btn-bulk {
      background: #fff; color: #6366f1;
      border: 1.5px solid #c7d2fe;
      margin-top: 8px;
    }
    .btn-bulk:hover:not(:disabled) { background: #eff6ff; border-color: #6366f1; }

    .btn-success { background: #16a34a; color: #fff; box-shadow: 0 2px 8px rgba(22,163,74,0.25); }
    .btn-success:hover:not(:disabled) { background: #15803d; }

    .btn-secondary {
      background: #fff; color: #718096;
      border: 1px solid #e8eaf0; margin-top: 8px; font-size: 12px;
    }
    .btn-secondary:hover:not(:disabled) { border-color: #a0aec0; color: #2d3748; }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #e8eaf0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }

    .biz-name { font-size: 15px; font-weight: 800; color: #1a202c; margin-bottom: 10px; }
    .biz-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #4a5568;
      margin-bottom: 6px;
    }
    .biz-row a { color: #6366f1; text-decoration: none; font-size: 11px; }
    .biz-row .icon { font-size: 13px; flex-shrink: 0; }
    .biz-email { color: #6366f1 !important; font-weight: 600; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 700;
      margin-top: 10px; width: 100%;
    }
    .badge-fire  { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .badge-weak  { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
    .badge-ok    { background: #e6fffa; color: #0d9488; border: 1px solid #99f6e4; }

    /* Score bar */
    .score-section { margin-top: 10px; }
    .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .score-label { font-size: 10px; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.4px; }
    .score-num { font-size: 18px; font-weight: 800; }
    .score-track { height: 6px; background: #f0f2f7; border-radius: 999px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }

    .issues { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .issue-row {
      font-size: 11px; color: #9a3412;
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 6px; padding: 5px 8px;
      display: flex; align-items: flex-start; gap: 5px;
    }
    .issue-row::before { content: '⚠'; font-size: 10px; flex-shrink: 0; margin-top: 1px; }

    .summary {
      font-size: 11px; color: #718096;
      margin-top: 8px; line-height: 1.5;
      font-style: italic;
      background: #f7f8fc; border-radius: 6px; padding: 7px 10px;
      border: 1px solid #e8eaf0;
    }

    /* Loader */
    .loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 16px; gap: 12px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e8eaf0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 12px; color: #a0aec0; font-weight: 500; }

    /* Not maps */
    .not-maps {
      text-align: center; padding: 24px 16px;
    }
    .not-maps-icon { font-size: 36px; margin-bottom: 10px; }
    .not-maps-title { font-size: 14px; font-weight: 700; color: #2d3748; margin-bottom: 6px; }
    .not-maps-sub { font-size: 12px; color: #a0aec0; line-height: 1.6; }
    .not-maps-sub strong { color: #4a5568; }

    /* Recent */
    .recent-section { margin-top: 14px; }
    .recent-title {
      font-size: 10px; font-weight: 700; color: #a0aec0;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: #fff;
      border: 1px solid #e8eaf0; border-radius: 8px; margin-bottom: 5px;
    }
    .recent-name { font-size: 12px; font-weight: 700; color: #1a202c; }
    .recent-type { font-size: 10px; color: #a0aec0; margin-top: 1px; }
    .recent-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 700; flex-shrink: 0; }
    .rb-fire { background: #fef2f2; color: #dc2626; }
    .rb-weak { background: #fff7ed; color: #c2410c; }
    .rb-ok   { background: #e6fffa; color: #0d9488; }

    /* Yelp search */
    .yelp-form { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
    .yelp-input { width:100%; padding:9px 12px; border:1px solid #e8eaf0; border-radius:8px; font-size:13px; font-family:inherit; color:#1a202c; outline:none; }
    .yelp-input:focus { border-color:#6366f1; }
    .yelp-result { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px; background:#fff; border:1px solid #e8eaf0; border-radius:8px; margin-bottom:6px; }
    .yelp-result-info { flex:1; min-width:0; }
    .yelp-result-name { font-size:12px; font-weight:700; color:#1a202c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .yelp-result-sub { font-size:10px; color:#a0aec0; margin-top:2px; }
    .yelp-save-btn { font-size:11px; font-weight:700; background:#6366f1; color:#fff; border:none; border-radius:6px; padding:5px 10px; cursor:pointer; white-space:nowrap; flex-shrink:0; font-family:inherit; }
    .yelp-save-btn:disabled { background:#c7d2fe; cursor:default; }
    .yelp-save-btn.saved { background:#16a34a; }
    .yelp-results-wrap { max-height:280px; overflow-y:auto; }

    /* Success state */
    .success-card {
      text-align: center; padding: 20px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; margin-top: 12px;
    }
    .success-icon { font-size: 28px; margin-bottom: 8px; }
    .success-title { font-size: 14px; font-weight: 800; color: #16a34a; margin-bottom: 4px; }
    .success-sub { font-size: 12px; color: #4ade80; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">LeadHunter <span>Pro</span></span>
    </div>
    <span class="saved-pill" id="savedCount">0 saved</span>
  </div>

  <!-- Tab bar -->
  <div style="display:flex; border-bottom:1px solid #e8eaf0; background:#fff;">
    <button id="tabMaps" onclick="switchTab('maps')"
      style="flex:1;padding:9px 0;font-size:12px;font-weight:700;border:none;background:transparent;cursor:pointer;border-bottom:2px solid #6366f1;color:#6366f1;font-family:inherit;">
      🗺️ Google Maps
    </button>
    <button id="tabYelp" onclick="switchTab('yelp')"
      style="flex:1;padding:9px 0;font-size:12px;font-weight:700;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#a0aec0;font-family:inherit;">
      ⭐ Yelp Search
    </button>
  </div>

  <div class="body" id="mainBody">
    <!-- Populated by popup.js -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
